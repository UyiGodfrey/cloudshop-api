name: CloudShop CI/CD

on:
  push:
    branches:
      - main

jobs:

  ci-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest


  docker-build:
    needs: ci-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cloudshop-api:${{ github.sha }} .


  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker rm -f cloudshop-container || true

            docker pull cloudshop-api:${{ github.sha }} || true

            docker run -d \
              --name cloudshop-container \
              -p 5001:5001 \
              cloudshop-api:${{ github.sha }}
