name: Deploy to EC2 (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd cloudshop-api
            git pull origin main

            docker build -t cloudshop-api:v1 .

            docker stop cloudshop-api || true
            docker rm cloudshop-api || true

            docker run -d \
            --name cloudshop-api \
            -p 3000:5001 \
            cloudshop-api:v1
