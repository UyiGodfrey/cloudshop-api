name: Project 4 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (safe fallback)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Tests
        run: |
          npm install || true
          npm test || true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cloudshop-api:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cloudshop-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/cloudshop-api:latest

            echo "Stopping old container..."
            docker stop cloudshop-api || true

            echo "Removing old container..."
            docker rm cloudshop-api || true

            echo "Starting new container..."
            docker run -d \
              --name cloudshop-api \
              -p 5001:5001 \
              ${{ secrets.DOCKER_USERNAME }}/cloudshop-api:latest

            echo "Deployment complete"
